services:
  - type: web
    name: rbx-keysystem
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure value
      - key: ADMIN_USERNAME
        value: admin                 # CHANGE THIS
      - key: ADMIN_PASSWORD
        value: changeme123           # CHANGE THIS to something strong
      - key: DATABASE_URL
        fromDatabase:
          name: rbx-keysystem-db
          property: connectionString

databases:
  - name: rbx-keysystem-db
    databaseName: keysystem
    user: keysystem
